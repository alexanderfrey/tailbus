syntax = "proto3";

package tailbus.v1;

option go_package = "github.com/alexanderfrey/tailbus/api/coordpb";

import "tailbus/v1/messages.proto";

service CoordinationAPI {
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
  rpc WatchPeerMap(WatchPeerMapRequest) returns (stream PeerMapUpdate);
  rpc LookupHandle(LookupHandleRequest) returns (LookupHandleResponse);
  rpc UpsertRoom(UpsertRoomRequest) returns (UpsertRoomResponse);
  rpc LookupRoom(LookupRoomRequest) returns (LookupRoomResponse);
  rpc ListRoomsForHandle(ListRoomsForHandleRequest) returns (ListRoomsForHandleResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc CreateTeam(CreateTeamRequest) returns (CreateTeamResponse);
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);
  rpc GetTeamMembers(GetTeamMembersRequest) returns (GetTeamMembersResponse);
  rpc CreateTeamInvite(CreateTeamInviteRequest) returns (CreateTeamInviteResponse);
  rpc AcceptTeamInvite(AcceptTeamInviteRequest) returns (AcceptTeamInviteResponse);
  rpc RemoveTeamMember(RemoveTeamMemberRequest) returns (RemoveTeamMemberResponse);
  rpc UpdateTeamMemberRole(UpdateTeamMemberRoleRequest) returns (UpdateTeamMemberRoleResponse);
  rpc DeleteTeam(DeleteTeamRequest) returns (DeleteTeamResponse);
}

message RegisterNodeRequest {
  string node_id = 1;
  bytes public_key = 2;
  string advertise_addr = 3;
  repeated string handles = 4;
  map<string, string> handle_descriptions = 5 [deprecated = true];
  map<string, ServiceManifest> handle_manifests = 6;
  bool is_relay = 7;
  string auth_token = 8;
  string team_id = 9;
}

message RegisterNodeResponse {
  bool ok = 1;
  string error = 2;
  string user_email = 3;
  int64 token_expires_at = 4;
  string team_id = 5;
  string team_name = 6;
}

message WatchPeerMapRequest {
  string node_id = 1;
  string team_id = 2;
}

message PeerMapUpdate {
  repeated PeerInfo peers = 1;
  int64 version = 2;
  repeated RelayInfo relays = 3;
  repeated RoomInfo rooms = 4;
}

message RelayInfo {
  string node_id = 1;
  bytes public_key = 2;
  string addr = 3;
}

message PeerInfo {
  string node_id = 1;
  bytes public_key = 2;
  string advertise_addr = 3;
  repeated string handles = 4;
  int64 last_heartbeat_unix = 5;
  map<string, string> handle_descriptions = 6 [deprecated = true];
  map<string, ServiceManifest> handle_manifests = 7;
}

message LookupHandleRequest {
  string handle = 1;
  string team_id = 2;
}

message LookupHandleResponse {
  PeerInfo peer = 1;
  bool found = 2;
}

message UpsertRoomRequest {
  RoomInfo room = 1;
  string team_id = 2;
}

message UpsertRoomResponse {
  bool ok = 1;
  string error = 2;
}

message LookupRoomRequest {
  string room_id = 1;
  string team_id = 2;
}

message LookupRoomResponse {
  RoomInfo room = 1;
  bool found = 2;
}

message ListRoomsForHandleRequest {
  string handle = 1;
  string team_id = 2;
}

message ListRoomsForHandleResponse {
  repeated RoomInfo rooms = 1;
}

message HeartbeatRequest {
  string node_id = 1;
  repeated string handles = 2;
  map<string, string> handle_descriptions = 3 [deprecated = true];
  map<string, ServiceManifest> handle_manifests = 4;
}

message HeartbeatResponse {
  bool ok = 1;
}

// Team management messages

message CreateTeamRequest {
  string auth_token = 1;
  string name = 2;
}

message CreateTeamResponse {
  string team_id = 1;
  string name = 2;
  string error = 3;
}

message ListTeamsRequest {
  string auth_token = 1;
}

message ListTeamsResponse {
  repeated TeamInfo teams = 1;
  string error = 2;
}

message TeamInfo {
  string team_id = 1;
  string name = 2;
  string role = 3;
}

message GetTeamMembersRequest {
  string auth_token = 1;
  string team_id = 2;
}

message GetTeamMembersResponse {
  repeated TeamMember members = 1;
  string error = 2;
}

message TeamMember {
  string email = 1;
  string role = 2;
}

message CreateTeamInviteRequest {
  string auth_token = 1;
  string team_id = 2;
  int32 max_uses = 3;
  int64 ttl_seconds = 4;
}

message CreateTeamInviteResponse {
  string code = 1;
  int64 expires_at = 2;
  string error = 3;
}

message AcceptTeamInviteRequest {
  string auth_token = 1;
  string code = 2;
}

message AcceptTeamInviteResponse {
  string team_id = 1;
  string team_name = 2;
  string error = 3;
}

message RemoveTeamMemberRequest {
  string auth_token = 1;
  string team_id = 2;
  string email = 3;
}

message RemoveTeamMemberResponse {
  string error = 1;
}

message UpdateTeamMemberRoleRequest {
  string auth_token = 1;
  string team_id = 2;
  string email = 3;
  string role = 4;
}

message UpdateTeamMemberRoleResponse {
  string error = 1;
}

message DeleteTeamRequest {
  string auth_token = 1;
  string team_id = 2;
}

message DeleteTeamResponse {
  string error = 1;
}
