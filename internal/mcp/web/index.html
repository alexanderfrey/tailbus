<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tailbus</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #4a5a8a;
    --error: #ff6b6b;
    --success: #51cf66;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  header h1 span { color: var(--accent); }
  .status { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .status-dot.offline { background: var(--error); }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 240px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; }
  .sidebar-header { padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
  .refresh-btn:hover { background: var(--border); color: var(--text); }
  .agent-list { flex: 1; overflow-y: auto; padding: 8px; }
  .agent-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: background 0.15s; }
  .agent-item:hover { background: var(--border); }
  .agent-item.selected { background: var(--accent-dim); }
  .agent-name { font-size: 14px; font-weight: 500; }
  .agent-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--border); color: var(--text-dim); }

  /* Chat */
  .chat { flex: 1; display: flex; flex-direction: column; }
  .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 500; color: var(--text-dim); }
  .chat-header .handle { color: var(--accent); }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 70%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .message.sent { align-self: flex-end; background: var(--accent-dim); border-bottom-right-radius: 2px; }
  .message.received { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
  .message.error { align-self: flex-start; background: #2a1a1a; border: 1px solid var(--error); color: var(--error); }
  .message .meta { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 14px; flex-direction: column; gap: 8px; }
  .empty-state .hint { font-size: 12px; }

  /* Command bar */
  .cmd-bar { padding: 8px 20px 0; display: flex; gap: 6px; flex-wrap: wrap; }
  .cmd-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--accent); font-size: 12px; cursor: pointer; font-family: inherit; }
  .cmd-btn:hover { background: var(--border); }
  .cmd-btn.active { background: var(--accent-dim); border-color: var(--accent); }

  /* Command form */
  .cmd-form { padding: 8px 20px; display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .cmd-form label { font-size: 11px; color: var(--text-dim); display: flex; flex-direction: column; gap: 3px; }
  .cmd-form input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; color: var(--text); font-family: inherit; font-size: 13px;
    outline: none; width: 120px;
  }
  .cmd-form input:focus { border-color: var(--accent); }

  /* Input area */
  .input-area { padding: 12px 20px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .input-area textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 14px;
    resize: none; outline: none; min-height: 42px; max-height: 120px;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea:disabled { opacity: 0.5; }
  .send-btn {
    background: var(--accent); border: none; border-radius: 8px; padding: 0 20px;
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .sending { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  @media (max-width: 600px) {
    .sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; display: none; }
    .sidebar.open { display: flex; }
    .message { max-width: 90%; }
    .mobile-toggle { display: block !important; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
  }
  .mobile-toggle { display: none; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>
    <h1><span>tail</span>bus</h1>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">connecting...</span>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>Agents</span>
      <button class="refresh-btn" onclick="loadAgents()" title="Refresh">&#8635;</button>
    </div>
    <div class="agent-list" id="agentList"></div>
  </div>

  <div class="chat">
    <div class="chat-header" id="chatHeader">Select an agent to start chatting</div>
    <div class="messages" id="messages">
      <div class="empty-state">
        <div>No agent selected</div>
        <div class="hint">Pick an agent from the sidebar</div>
      </div>
    </div>
    <div id="cmdBar" class="cmd-bar" style="display:none"></div>
    <div id="cmdForm" class="cmd-form" style="display:none"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Type a message..." rows="1" disabled
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>Send</button>
    </div>
  </div>
</div>

<script>
let agents = [];
let selected = null;
let selectedCmd = null;
let conversations = {};

function getAgent(handle) { return agents.find(a => a.handle === handle); }

async function loadAgents() {
  try {
    const res = await fetch('/api/agents');
    agents = await res.json() || [];
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = agents.length + ' agent' + (agents.length !== 1 ? 's' : '');
    renderAgentList();
  } catch (e) {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = 'disconnected';
  }
}

function renderAgentList() {
  const el = document.getElementById('agentList');
  if (!agents.length) { el.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-size:13px;">No agents connected</div>'; return; }
  el.innerHTML = agents.map(a => `
    <div class="agent-item ${selected === a.handle ? 'selected' : ''}" onclick="selectAgent('${a.handle}')">
      <div class="agent-name">${esc(a.handle)}</div>
      ${a.description ? `<div class="agent-desc">${esc(a.description)}</div>` : ''}
      ${a.tags && a.tags.length ? `<div class="agent-tags">${a.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>`).join('');
}

function selectAgent(handle) {
  selected = handle;
  selectedCmd = null;
  if (!conversations[handle]) conversations[handle] = [];
  document.getElementById('input').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  const a = getAgent(handle);
  document.getElementById('chatHeader').innerHTML = 'Talking to <span class="handle">' + esc(handle) + '</span>' +
    (a && a.description ? ' <span style="font-weight:normal;color:var(--text-dim)"> &mdash; ' + esc(a.description) + '</span>' : '');
  renderAgentList();
  renderMessages();
  renderCommands();
  document.getElementById('input').focus();
  document.getElementById('sidebar').classList.remove('open');
}

function renderCommands() {
  const bar = document.getElementById('cmdBar');
  const form = document.getElementById('cmdForm');
  const a = getAgent(selected);
  if (!a || !a.commands || !a.commands.length) {
    bar.style.display = 'none';
    form.style.display = 'none';
    document.getElementById('input').placeholder = 'Type a message...';
    return;
  }
  bar.style.display = 'flex';
  bar.innerHTML = a.commands.map(c =>
    `<button class="cmd-btn ${selectedCmd === c.name ? 'active' : ''}" onclick="pickCmd('${c.name}')" title="${esc(c.description)}">${esc(c.name)}</button>`
  ).join('') + `<button class="cmd-btn ${selectedCmd === null ? 'active' : ''}" onclick="pickCmd(null)">free text</button>`;
  renderCmdForm();
}

function pickCmd(name) {
  selectedCmd = name;
  renderCommands();
  // Focus the first input in the form, or the textarea
  const firstInput = document.querySelector('.cmd-form input');
  if (firstInput) firstInput.focus();
  else document.getElementById('input').focus();
}

function renderCmdForm() {
  const form = document.getElementById('cmdForm');
  const input = document.getElementById('input');
  if (!selectedCmd) {
    form.style.display = 'none';
    input.placeholder = 'Type a message...';
    input.style.display = '';
    return;
  }
  const a = getAgent(selected);
  const cmd = a.commands.find(c => c.name === selectedCmd);
  if (!cmd || !cmd.parametersSchema) {
    form.style.display = 'none';
    input.placeholder = `Type arguments for ${selectedCmd}...`;
    input.style.display = '';
    return;
  }
  let schema;
  try { schema = JSON.parse(cmd.parametersSchema); } catch(e) { form.style.display = 'none'; return; }
  const props = schema.properties || {};
  const required = schema.required || [];
  const fields = Object.entries(props);
  if (!fields.length) { form.style.display = 'none'; return; }

  input.style.display = 'none';
  form.style.display = 'flex';
  form.innerHTML = fields.map(([name, prop]) => {
    const type = prop.type === 'number' ? 'number' : 'text';
    const req = required.includes(name) ? ' *' : '';
    const desc = prop.description || name;
    return `<label>${esc(name)}${req}<input type="${type}" name="${esc(name)}" placeholder="${esc(desc)}" data-field="${esc(name)}" step="any"></label>`;
  }).join('');

  // Focus first field
  setTimeout(() => { const f = form.querySelector('input'); if (f) f.focus(); }, 0);
  // Enter key on any field sends
  form.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); send(); } });
  });
}

function buildPayload() {
  const a = getAgent(selected);
  if (!selectedCmd) {
    return document.getElementById('input').value.trim();
  }
  const cmd = a.commands.find(c => c.name === selectedCmd);
  let args = {};
  let schema;
  try { schema = JSON.parse(cmd.parametersSchema); } catch(e) { schema = null; }
  const form = document.getElementById('cmdForm');
  if (form.style.display !== 'none') {
    form.querySelectorAll('input').forEach(inp => {
      const name = inp.dataset.field;
      let val = inp.value.trim();
      if (schema && schema.properties && schema.properties[name] && schema.properties[name].type === 'number') {
        val = val === '' ? 0 : parseFloat(val);
      }
      args[name] = val;
    });
  } else {
    const raw = document.getElementById('input').value.trim();
    try { args = JSON.parse(raw); } catch(e) { args = { message: raw }; }
  }
  return JSON.stringify({ command: selectedCmd, arguments: args });
}

function displayPayload() {
  if (!selectedCmd) return document.getElementById('input').value.trim();
  const a = getAgent(selected);
  const form = document.getElementById('cmdForm');
  if (form.style.display !== 'none') {
    const parts = [];
    form.querySelectorAll('input').forEach(inp => { if (inp.value.trim()) parts.push(`${inp.dataset.field}=${inp.value.trim()}`); });
    return `${selectedCmd}(${parts.join(', ')})`;
  }
  return `${selectedCmd}: ${document.getElementById('input').value.trim()}`;
}

function clearInputs() {
  document.getElementById('input').value = '';
  document.getElementById('input').style.height = 'auto';
  document.getElementById('cmdForm').querySelectorAll('input').forEach(inp => { inp.value = ''; });
}

function renderMessages() {
  const el = document.getElementById('messages');
  const msgs = conversations[selected] || [];
  if (!msgs.length) {
    const a = getAgent(selected);
    const hasCmd = a && a.commands && a.commands.length;
    el.innerHTML = `<div class="empty-state"><div>Start a conversation with ${esc(selected)}</div><div class="hint">${hasCmd ? 'Pick a command above or type free text' : 'Type a message below'}</div></div>`;
    return;
  }
  el.innerHTML = msgs.map(m => {
    let text = m.text;
    // Try to pretty-print JSON responses
    if (m.role === 'received' || m.role === 'error') {
      try { const j = JSON.parse(text); text = JSON.stringify(j, null, 2); } catch(e) {}
    }
    return `<div class="message ${m.role}"><div class="meta">${m.role === 'sent' ? 'you' : esc(selected)} &middot; ${fmtTime(m.time)}</div>${esc(text)}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function send() {
  if (!selected) return;
  const payload = buildPayload();
  if (!payload) return;
  const display = displayPayload();

  clearInputs();
  conversations[selected].push({ role: 'sent', text: display, time: new Date() });
  renderMessages();

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.classList.add('sending'); btn.textContent = '...';
  setInputsDisabled(true);

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ handle: selected, message: payload }),
    });
    const data = await res.json();
    conversations[selected].push({ role: data.error ? 'error' : 'received', text: data.message, time: new Date() });
  } catch (e) {
    conversations[selected].push({ role: 'error', text: 'Network error: ' + e.message, time: new Date() });
  }

  btn.disabled = false; btn.classList.remove('sending'); btn.textContent = 'Send';
  setInputsDisabled(false);
  const firstInput = document.querySelector('.cmd-form input') || document.getElementById('input');
  firstInput.focus();
  renderMessages();
}

function setInputsDisabled(disabled) {
  document.getElementById('input').disabled = disabled;
  document.querySelectorAll('.cmd-form input').forEach(i => { i.disabled = disabled; });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(d) { return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

loadAgents();
setInterval(loadAgents, 10000);
</script>
</body>
</html>
