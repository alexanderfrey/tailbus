# Multi-agent LLM collaboration on tailbus
#
# Three LLM-powered agents (researcher, critic, writer) collaborate through
# the mesh, all using your local LM Studio as the LLM backend.
#
# Usage:
#   1. Start LM Studio and load a model (port 1234)
#   2. docker compose up --build
#   3. Open http://localhost:8080
#   4. Click "researcher" and ask it to investigate any topic
#
# Flow: you → researcher → (generates findings) → critic → (reviews) → writer → (polishes) → you
#
# The researcher orchestrates the pipeline: it generates initial findings,
# delegates to the critic for review, then sends everything to the writer
# for the final polished output. Three LLM calls, three agents, one mesh.

services:
  coord:
    build:
      context: ../..
      target: coord
    ports:
      - "8443:8443"
    volumes:
      - coord-data:/data
    command: ["-data-dir", "/data", "-listen", ":8443", "-health-addr", ":8081"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10

  daemon:
    build:
      context: ../..
      target: daemon
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - daemon-data:/data
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      coord:
        condition: service_healthy
    command:
      - -node-id
      - main
      - -coord
      - coord:8443
      - -advertise
      - daemon:9443
      - -listen
      - ":9443"
      - -socket
      - /var/run/tailbus/tailbusd.sock
      - -metrics
      - ":9090"
      - -mcp
      - ":8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/readyz"]
      interval: 3s
      timeout: 2s
      retries: 10

  researcher:
    build:
      context: ../..
      target: daemon
    volumes:
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      daemon:
        condition: service_healthy
    entrypoint: ["python3", "/agents/researcher_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

  critic:
    build:
      context: ../..
      target: daemon
    volumes:
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      daemon:
        condition: service_healthy
    entrypoint: ["python3", "/agents/critic_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

  writer:
    build:
      context: ../..
      target: daemon
    volumes:
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      daemon:
        condition: service_healthy
    entrypoint: ["python3", "/agents/writer_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

volumes:
  coord-data:
  daemon-data:
  daemon-sock:
